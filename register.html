<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация в Мессенджере</title>
    <!-- Подключение шрифта Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Подключение иконок FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Те же стили для единообразия */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; /* Используем min-height, чтобы контент не обрезался на маленьких экранах */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header i {
            font-size: 40px;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .header h2 {
            color: #333;
            font-weight: 600;
        }

        .header p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 15px; /* Чуть меньше отступ, так как полей больше */
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .input-wrapper input:focus {
            border-color: #764ba2;
        }

        /* Стили для чекбокса согласия */
        .terms {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }

        .terms input {
            margin-top: 3px;
            margin-right: 10px;
            accent-color: #764ba2;
            cursor: pointer;
        }

        .terms a {
            color: #764ba2;
            text-decoration: none;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .footer a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="header">
            <i class="fa-solid fa-user-plus"></i>
            <h2>Создать аккаунт</h2>
            <p>Присоединяйтесь к нам сегодня</p>
        </div>

        <form action="#" method="POST">
            <!-- Имя пользователя -->
            <div class="input-group">
                <label for="username">Имя пользователя</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Ivan Ivanov" required>
                </div>
            </div>

            <!-- Email -->
            <div class="input-group">
                <label for="email">Email адрес</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
            </div>

            <!-- Пароль -->
            <div class="input-group">
                <label for="password">Пароль</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Придумайте пароль" required>
                </div>
            </div>

            <!-- Повтор пароля -->
            <div class="input-group">
                <label for="confirm-password">Повторите пароль</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-check-double"></i>
                    <input type="password" id="confirm-password" placeholder="Повторите пароль" required>
                </div>
            </div>

            <!-- Согласие с правилами -->
            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">Я согласен с <a href="#">Условиями использования</a> и <a href="#">Политикой конфиденциальности</a></label>
            </div>

            <!-- Кнопка регистрации -->
            <button type="submit" class="btn-register">Зарегистрироваться</button>
        </form>

        <div class="footer">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
    </div>

</body>
</html>
