<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер - Админ Панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            display: flex;
            height: 100vh;
            background-color: #f4f6f8;
        }

        /* Боковая панель */
        .sidebar {
            width: 300px;
            background-color: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-item:hover, .chat-item.active {
            background-color: #f9f9f9;
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            background-color: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .chat-details h4 { font-size: 15px; margin-bottom: 5px; color: #333; }
        .chat-details p { font-size: 13px; color: #888; }

        /* Основная область чата */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }

        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 600;
            color: #333;
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            background-color: #f4f6f8;
            overflow-y: auto;
        }

        .message {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.received {
            background-color: white;
            align-self: flex-start;
            border-bottom-left-radius: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.sent {
            background-color: #667eea;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        .send-btn {
            background-color: #667eea;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Боковая панель -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                <div class="avatar"><i class="fa-solid fa-user-shield"></i></div>
                <span>Администратор</span>
            </div>
          <button class="logout-btn" onclick="window.location.href='index.html'">
    <i class="fa-solid fa-right-from-bracket"></i>
</button>
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>

        <div class="chat-list">
            <div class="chat-item active">
                <div class="chat-avatar"><i class="fa-solid fa-user"></i></div>
                <div class="chat-details">
                    <h4>Поддержка</h4>
                    <p>Привет! Как дела?</p>
                </div>
            </div>
            <div class="chat-item">
                <div class="chat-avatar" style="background:#ffe0b2"><i class="fa-solid fa-user"></i></div>
                <div class="chat-details">
                    <h4>Иван Иванов</h4>
                    <p>Спасибо за помощь</p>
                </div>
            </div>
            <div class="chat-item">
                <div class="chat-avatar" style="background:#c8e6c9"><i class="fa-solid fa-users"></i></div>
                <div class="chat-details">
                    <h4>Общий чат</h4>
                    <p>Новое обновление готово</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Основной чат -->
    <div class="main-chat">
        <div class="chat-header">
            Поддержка
        </div>
        <div class="messages-area">
            <div class="message received">
                Здравствуйте! Это тестовый интерфейс мессенджера.
            </div>
            <div class="message sent">
                Привет! Выглядит отлично.
            </div>
            <div class="message received">
                Рад слышать. Теперь вы можете использовать этот шаблон для дальнейшей разработки.
            </div>
        </div>
        <div class="input-area">
            <input type="text" placeholder="Напишите сообщение...">
            <button class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

</body>
</html>
