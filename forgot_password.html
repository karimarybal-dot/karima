<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <!-- Подключение шрифта Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Подключение иконок FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Те же стили для единообразия */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .recover-container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header i {
            font-size: 50px;
            color: #764ba2;
            margin-bottom: 15px;
        }

        .header h2 {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 14px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .input-wrapper input:focus {
            border-color: #764ba2;
        }

        .btn-recover {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }

        .btn-recover:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .back-link {
            text-align: center;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link i {
            margin-right: 5px;
        }

        .back-link:hover {
            color: #764ba2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="recover-container">
        <div class="header">
            <!-- Иконка ключа -->
            <i class="fa-solid fa-key"></i>
            <h2>Забыли пароль?</h2>
            <p>Не переживайте! Введите ваш email, и мы отправим вам инструкцию по сбросу пароля.</p>
        </div>

        <form action="#" method="POST">
            <!-- Поле Email -->
            <div class="input-group">
                <label for="email">Email адрес</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
            </div>

            <!-- Кнопка отправки -->
            <button type="submit" class="btn-recover">Отправить ссылку</button>
            
            <!-- Ссылка назад -->
            <a href="login.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Вернуться ко входу
            </a>
        </form>
    </div>

    <!-- Небольшой скрипт для имитации отправки (можно удалить) -->
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault(); // Останавливаем перезагрузку страницы
            const email = document.getElementById('email').value;
            if(email) {
                alert(`Ссылка для сброса пароля отправлена на ${email}`);
                // Здесь обычно происходит перенаправление или очистка формы
            }
        });
    </script>

</body>
</html>
