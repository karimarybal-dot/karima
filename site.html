<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Шарики при нажатии</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Стиль красивой кнопки */
  #ballButton {
    padding: 15px 40px;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(45deg, #ff6f61, #ffcc70);
    border: none;
    border-radius: 50px;
    box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    z-index: 10;
  }

  #ballButton:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 20px rgba(0,0,0,0.3);
  }

  #ballButton:active {
    transform: scale(0.98);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<button id="ballButton">Запустить шарики</button>

<script>
  const button = document.getElementById('ballButton');

  function createBall() {
    const ball = document.createElement('div');
    ball.style.position = 'absolute';
    ball.style.bottom = '0px';
    ball.style.left = Math.random() * window.innerWidth + 'px';
    ball.style.width = '20px';
    ball.style.height = '20px';
    ball.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`; // цвет радуги
    ball.style.borderRadius = '50%';
    ball.style.opacity = '0.8';
    document.body.appendChild(ball);

    // Анимация взлета
    let position = 0;
    const maxHeight = Math.random() * 300 + 200; // высота взлёта
    const fallSpeed = 2 + Math.random() * 2; // скорость

    function animate() {
      position += fallSpeed;
      ball.style.bottom = position + 'px';

      if (position < maxHeight) {
        requestAnimationFrame(animate);
      } else {
        // Шарик достигает вершины, начинаем падение
        fall();
      }
    }

    function fall() {
      if (position > 0) {
        position -= fallSpeed;
        ball.style.bottom = position + 'px';
        requestAnimationFrame(fall);
      } else {
        // Удаляем шарик
        document.body.removeChild(ball);
      }
    }

    animate();
  }

  button.addEventListener('click', () => {
    // Создаём несколько шариков при нажатии
    for (let i = 0; i < 12; i++) {
      setTimeout(createBall, i * 150); // задержка между шариками
    }
  });
</script>

</body>
</html>
