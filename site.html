<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Интернет-магазин техники</title>
<!-- Подключение шрифтов Google -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
<style>
    body {
        font-family: 'Roboto', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f0f2f5;
        color: #333;
    }

    header {
        background-color: #1f2937;
        padding: 30px 20px;
        color: #fff;
        text-align: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    header h1 {
        margin: 0;
        font-size: 2.5em;
        letter-spacing: 2px;
    }

    nav {
        display: flex;
        justify-content: center;
        background-color: #374151;
        padding: 10px 0;
    }

    nav a {
        color: #fff;
        margin: 0 20px;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s;
    }

    nav a:hover {
        color: #60a5fa;
    }

    .container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
    }

    h2 {
        text-align: center;
        font-size: 2em;
        margin-bottom: 30px;
        color: #111827;
    }

    .products {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        justify-content: center;
    }

    .product {
        background-color: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        width: 240px;
        padding: 20px;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .product:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 24px rgba(0,0,0,0.2);
    }

    .product img {
        width: 100%;
        border-radius: 8px;
        margin-bottom: 15px;
        transition: transform 0.3s;
    }

    .product img:hover {
        transform: scale(1.05);
    }

    .product h3 {
        margin: 10px 0 8px;
        font-size: 1.2em;
        color: #111827;
        text-align: center;
    }

    .price {
        color: #10b981;
        font-weight: 700;
        font-size: 1.2em;
        text-align: center;
        margin-bottom: 15px;
    }

    .buy-btn {
        display: block;
        width: 100%;
        padding: 12px 0;
        background-color: #3b82f6;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 1em;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .buy-btn:hover {
        background-color: #2563eb;
    }

    footer {
        background-color: #1f2937;
        color: #d1d5db;
        text-align: center;
        padding: 30px 20px;
        margin-top: 60px;
    }

    /* Мобильная адаптация */
    @media(max-width: 768px) {
        nav {
            flex-direction: column;
        }
        nav a {
            margin: 10px 0;
        }
        .products {
            justify-content: center;
        }
        .product {
            width: 100%;
        }
    }
</style>
</head>
<body>
<header>
    <h1>Магазин техники</h1>
</header>
<nav>
    <a href="#">Главная</a>
    <a href="#">Каталог</a>
    <a href="#">Контакты</a>
    <a href="#">О нас</a>
</nav>
<div class="container">
    <h2>Наши товары</h2>
    <div class="products">
        <div class="product">
            <img src="https://via.placeholder.com/240x180.png?text=Ноутбук" alt="Ноутбук" />
            <h3>Ноутбук HP</h3>
            <div class="price">50 000 ₽</div>
            <button class="buy-btn">Купить</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/240x180.png?text=Смартфон" alt="Смартфон" />
            <h3>Смартфон Samsung</h3>
            <div class="price">30 000 ₽</div>
            <button class="buy-btn">Купить</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/240x180.png?text=Телевизор" alt="Телевизор" />
            <h3>Телевизор LG</h3>
            <div class="price">45 000 ₽</div>
            <button class="buy-btn">Купить</button>
        </div>
        <!-- Можно добавить больше товаров -->
    </div>
</div>
<footer>
    <p>Контакты: karimarybal@gmail.com | Телефон: +7 (993) 930-6358</p>
    <p>&copy; 2026 Магазин техники. Все права защищены.</p>
</footer>
</body>
</html>
