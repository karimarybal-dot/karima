<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Интернет-магазин техники</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            padding: 20px;
            color: white;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #444;
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            display: block;
        }
        nav a:hover {
            background-color: #555;
        }
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .product {
            background-color: white;
            padding: 10px;
            width: 200px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .product img {
            max-width: 100%;
            border-radius: 8px;
        }
        .product h3 {
            margin: 10px 0 5px;
        }
        .price {
            color: green;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .buy-btn {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .buy-btn:hover {
            background-color: #218838;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Магазин техники</h1>
    </header>
    <nav>
        <a href="#">Главная</a>
        <a href="#">Каталог</a>
        <a href="#">Контакты</a>
        <a href="#">О нас</a>
    </nav>
    <div class="container">
        <h1>Наши товары</h1>
        <div class="products">
            <div class="product">
                <img src="https://via.placeholder.com/200x150.png?text=Ноутбук" alt="Ноутбук" />
                <h3>Ноутбук HP</h3>
                <div class="price">50 000 ₽</div>
                <button class="buy-btn">Купить</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/200x150.png?text=Смартфон" alt="Смартфон" />
                <h3>Смартфон Samsung</h3>
                <div class="price">30 000 ₽</div>
                <button class="buy-btn">Купить</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/200x150.png?text=Телевизор" alt="Телевизор" />
                <h3>Телевизор LG</h3>
                <div class="price">45 000 ₽</div>
                <button class="buy-btn">Купить</button>
            </div>
        </div>
    </div>
    <footer>
        <p>Контакты:  | Телефон: </p>
        <p>&copy; 2026 Магазин техники</p>
    </footer>
</body>
</html>
