<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Мессенджер</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background-color: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; animation: fadeIn 0.8s ease; }
        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 50px; color: #764ba2; margin-bottom: 10px; }
        .header h2 { color: #333; font-weight: 600; }
        .header p { color: #888; font-size: 14px; margin-top: 5px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
        .input-wrapper input { width: 100%; padding: 12px 15px 12px 45px; border: 2px solid #eee; border-radius: 10px; outline: none; transition: all 0.3s ease; font-size: 15px; }
        .input-wrapper input:focus { border-color: #764ba2; }
        .actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 13px; }
        .remember-me { display: flex; align-items: center; color: #666; cursor: pointer; }
        .remember-me input { margin-right: 8px; accent-color: #764ba2; }
        .forgot-pass { color: #764ba2; text-decoration: none; font-weight: 500; }
        .forgot-pass:hover { text-decoration: underline; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(to right, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4); }
        .footer { text-align: center; margin-top: 25px; font-size: 14px; color: #666; }
        .footer a { color: #764ba2; text-decoration: none; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .error-msg { color: #ff4d4d; font-size: 13px; text-align: center; margin-bottom: 15px; display: none; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <i class="fa-brands fa-rocketchat"></i>
            <h2>Добро пожаловать</h2>
            <p>Войдите, чтобы продолжить общение</p>
        </div>

        <form id="loginForm">
            <div id="errorMessage" class="error-msg">Неверный логин или пароль</div>

            <div class="input-group">
                <label for="loginInput">Логин</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="loginInput" placeholder="Введите логин" required>
                </div>
            </div>

            <div class="input-group">
                <label for="passwordInput">Пароль</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="passwordInput" placeholder="••••••••" required>
                </div>
            </div>

            <div class="actions">
                <label class="remember-me">
                    <input type="checkbox"> Запомнить меня
                </label>
                <!-- Ссылка ведет на forgot_password.html -->
                <a href="forgot_password.html" class="forgot-pass">Забыли пароль?</a>
            </div>

            <button type="submit" class="btn-login">Войти</button>
        </form>

        <div class="footer">
            <!-- Ссылка ведет на register.html -->
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const loginValue = document.getElementById('loginInput').value;
            const passwordValue = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMessage');

            if (loginValue === 'adm' && passwordValue === 'adm') {
                window.location.href = 'messenger.html';
            } else {
                errorMsg.style.display = 'block';
                document.querySelector('.login-container').style.animation = 'none';
                setTimeout(() => {
                    document.querySelector('.login-container').style.animation = 'shake 0.5s';
                }, 10);
            }
        });
    </script>

</body>
</html>
